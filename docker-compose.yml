version: "3.8"

services:
  apileela:
    build: .
    image: apileela:latest
    container_name: apileela
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      MONGO_URL: "mongodb://mongo:27017/"
      MONGO_DB: "apileela"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: apileela-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
